    <style>
        :root {
            --bg-deep: #000000;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: white;
            overflow: hidden;
        }

        /* Source App Specific CSS (from layout.js) */
        .bg-grid {
            background-color: #000000;
            background-image: linear-gradient(rgba(0, 119, 255, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 119, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .animate-blob {
            animation: blob 7s infinite;
        }

        @keyframes blob {
            0% {
                transform: translate(0px, 0px) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0px, 0px) scale(1);
            }
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .animation-delay-4000 {
            animation-delay: 4s;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        /* Dot Animation for Chat */
        .dot-flashing {
            position: relative;
            width: 4px;
            height: 4px;
            border-radius: 5px;
            background-color: #a855f7;
            /* purple-500 */
            color: #a855f7;
            animation: dot-flashing 1s infinite linear alternate;
            animation-delay: 0.5s;
        }

        .dot-flashing::before,
        .dot-flashing::after {
            content: '';
            display: inline-block;
            position: absolute;
            top: 0;
        }

        .dot-flashing::before {
            left: -8px;
            width: 4px;
            height: 4px;
            border-radius: 5px;
            background-color: #a855f7;
            color: #a855f7;
            animation: dot-flashing 1s infinite alternate;
            animation-delay: 0s;
        }

        .dot-flashing::after {
            left: 8px;
            width: 4px;
            height: 4px;
            border-radius: 5px;
            background-color: #a855f7;
            color: #a855f7;
            animation: dot-flashing 1s infinite alternate;
            animation-delay: 1s;
        }

        @keyframes dot-flashing {
            0% {
                background-color: #a855f7;
            }

            50%,
            100% {
                background-color: rgba(168, 85, 247, 0.2);
            }
        }

        /* Sidebar State */
        .nav-item.active {
            background-color: rgba(59, 130, 246, 0.2);
            /* bg-blue-500/20 */
            color: white;
            font-weight: 600;
        }

        .nav-item .indicator {
            opacity: 0;
            transition: opacity 0.3s;
        }

        .nav-item.active .indicator {
            opacity: 1;
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Entry Animation Keyframes */
        .animate-draw {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: draw 2s cubic-bezier(0.85, 0, 0.15, 1) forwards;
            /* Spring-like bezier */
        }

        @keyframes draw {
            to {
                stroke-dashoffset: 0;
            }
        }

        .delay-1 {
            animation-delay: 0.5s;
        }

        .delay-2 {
            animation-delay: 1s;
        }

        .animate-fade-up {
            animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Bg Pattern Animation */
        .animate-pan {
            animation: pan 30s linear infinite;
        }

        @keyframes pan {
            0% {
                background-position: 0% 0%;
            }

            100% {
                background-position: 50% 50%;
            }
        }

        /* Combined Animation (Draw Blue -> Glow White) */
        .animate-draw {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation:
                draw 2s cubic-bezier(0.85, 0, 0.15, 1) forwards 0.5s,
                fillWhite 1s ease forwards 1s;
        }

        @keyframes draw {
            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes fillWhite {
            to {
                fill: rgba(255, 255, 255, 1);
                filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.5));
            }
        }


        #entry-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Helpers */
        #ai-helper-popover {
            display: none;
        }

        #ai-helper-popover.show {
            display: block;

        }

        #tutorial-overlay {
            display: none;
        }

        #tutorial-overlay.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>

        async function generateImage() {
            const prompt = document.getElementById('prompt-input').value;
            if (!prompt) { alert('Please describe your vision!'); return; }

            // UI State
            const loader = document.getElementById('gallery-loader');
            const empty = document.getElementById('gallery-empty');
            const result = document.getElementById('gallery-result');
            const resImg = document.getElementById('result-img');

            empty.classList.add('hidden');
            result.classList.add('hidden');
            loader.classList.remove('hidden');

            // 1. Submit Job
            try {
                console.log("Sending request to Veda Core...");
                const response = await fetch('http://localhost:3000/api/generations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: 'image',
                        prompt: prompt,
                        model_id: document.getElementById('model-selector').value,
                        target: 'comfyui' // All models route through ComfyUI
                    })
                });

                if (!response.ok) throw new Error('Core Communication Failed');
                const data = await response.json();

                if (data.status === 'queued') {
                    console.log("Job Queued. Entering Polling Mode...");
                    pollForCompletion(Date.now());
                } else {
                    // Fallback for sync responses
                    const imgUrl = `http://localhost:3000${data.data.output_path}`;
                    resImg.src = imgUrl;
                    resImg.onload = () => {
                        loader.classList.add('hidden');
                        result.classList.remove('hidden');
                    };
                }

            } catch (error) {
                console.error(error);
                alert('Veda Core Error: ' + error.message);
                loader.classList.add('hidden');
                empty.classList.remove('hidden');
            }
        }

        // New Polling Function
        function pollForCompletion(startTime) {
            const loaderText = document.querySelector('#gallery-loader p');
            let checks = 0;
            const MAX_CHECKS = 100; // 100 * 3s = 5 minutes max

            const interval = setInterval(async () => {
                checks++;
                if (loaderText) loaderText.innerText = `Generating Masterpiece... (${checks * 3}s)`;

                // Timeout after MAX_CHECKS
                if (checks >= MAX_CHECKS) {
                    clearInterval(interval);
                    const loader = document.getElementById('gallery-loader');
                    const empty = document.getElementById('gallery-empty');
                    if (loader) loader.classList.add('hidden');
                    if (empty) empty.classList.remove('hidden');
                    alert('Generation timed out. Please check if ComfyUI is running and the model is loaded.');
                    return;
                }

                try {
                    const res = await fetch('http://localhost:3000/api/generations?take=1');
                    const history = await res.json();

                    if (history && history.length > 0) {
                        const latest = history[0];
                        const genTime = new Date(latest.created_at).getTime();

                        if (genTime > (startTime - 30000)) {
                            clearInterval(interval);
                            console.log("Generation Found!", latest);

                            const resImg = document.getElementById('result-img');
                            const loader = document.getElementById('gallery-loader');
                            const result = document.getElementById('gallery-result');

                            resImg.src = `http://localhost:3000${latest.output_path}`;
                            resImg.onload = () => {
                                loader.classList.add('hidden');
                                result.classList.remove('hidden');
                            };
                        }
                    }
                } catch (e) {
                    console.warn("Polling Check Failed:", e);
                }
            }, 3000);
        }

        // --- Video Logic ---
        async function generateVideo() {
            const prompt = document.getElementById('video-prompt').value;
            const model = document.getElementById('video-model-select').value;

            if (!prompt) { alert('Describe the motion first!'); return; }

            // Placeholder Check for SVD (Phase 5)
            if (model === 'svd') {
                alert("Stable Video Diffusion (SVD) is reserved for Phase 5 Cloud Deployment.\nPlease use Wan 2.2 (ComfyUI) which is currently installed.");
                return;
            }

            const loader = document.getElementById('video-loader');
            const result = document.getElementById('video-result');
            const player = document.getElementById('video-player');

            loader.classList.remove('hidden');
            result.classList.add('hidden');

            try {
                console.log(`Sending Video Request to /api/video using ${model}...`);
                const response = await fetch('/api/video', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: prompt,
                        model: model, // Send selected model
                        motion_bucket_id: 127
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Video Generation Failed');
                }

                const data = await response.json();
                console.log("Video Job:", data);

                if (data.status === 'queued') {
                    // Poll for completion
                    const promptId = data.prompt_id;
                    const interval = setInterval(async () => {
                        try {
                            const statusRes = await fetch(`/api/video/status/${promptId}`);
                            const statusData = await statusRes.json();

                            if (statusData.status === 'completed' && statusData.video_url) {
                                clearInterval(interval);
                                player.src = statusData.video_url;
                                result.classList.remove('hidden');
                                loader.classList.add('hidden');
                            }
                        } catch (e) {
                            console.error("Polling Error:", e);
                        }
                    }, 2000);
                }

            } catch (error) {
                console.error(error);
                alert('Video Error: \n' + error.message);
                loader.classList.add('hidden');
            }
        }

                    method: 'POST',

                    })
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`Server Error (${response.status}): ${errText}`);
                }

                const data = await response.json();

                } else {

                }

            } catch (error) {
                console.error("Voice Error:", error);
                alert('Voice Generation Failed:\n' + error.message);
                loader.classList.add('hidden');
            }

        async function sendRealMessage() {
            const input = document.getElementById('chat-input');
            const fileInput = document.getElementById('chat-file');
            const text = input.value.trim();

            // Check for file
            let contentToSend = text;
            if (fileInput.files.length > 0) {
                // Upload first
                // For simplicity in this non-blocking UI, we'll assume uploadFile() returns URL or we handle it here
                // We haven't implemented a separate uploadFile helper that returns.
                // Let's implement inline upload logic or assume handleFileSelect stores it.
                // We'll skip file logic for this fix to ensure basic chat works, OR specificy simple text.
                // Re-implementing logic from previous session:
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                try {
                    const uploadRes = await fetch('http://localhost:3000/api/upload', { method: 'POST', body: formData });
                    const uploadData = await uploadRes.json();
                    if (uploadData.url) {
                        contentToSend += `\n\n[User uploaded file](${uploadData.url})`;
                    }
                } catch (e) { console.error("Upload failed", e); }

                // Clear file input
                fileInput.value = '';
                document.getElementById('file-indicator').classList.add('hidden');
            }

            if (!contentToSend && !text) return;

            // Fix silent 404 for mock chats by dynamically creating them before sending
            if (!currentChatId || currentChatId.toString().startsWith('mock')) {
                try {
                    const initRes = await fetch('http://localhost:3000/api/chats', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title: text.substring(0, 20) + '...' })
                    });
                    const newChat = await initRes.json();
                    currentChatId = newChat.id;
                } catch (e) {
                    return alert("Failed to initialize chat connection.");
                }
            }

            // Client-Side Context Scraping (/fetch)
            if (contentToSend.startsWith('/fetch ')) {
                const urlMatch = contentToSend.match(/^\/fetch\s+(https?:\/\/[^\s]+)/);
                if (urlMatch) {
                    const url = urlMatch[1];
                    try {
                        // Simple fetch logic to get page text using an open CORS proxy (or we could use backend)
                        // For this implementation, we will pass the URL to backend and ask it to scrape context
                        // But we can also simulate it quickly if we want to augment the prompt:
                        contentToSend = `Please read this context and answer my query about ${url}. [Fetching URL text happens server-side via tool or natively]`;
                        // Real scraping is best done Server-Side so we append instruction for AI to use its web tools.
                    } catch (e) {
                        console.warn("Fetch failed locally", e);
                    }
                }
            }

            input.value = '';
            const container = document.getElementById('chat-messages');

            // 1. Append User Message
            const userHTML = `
                <div class="flex gap-4 flex-row-reverse animate-[slideIn_0.3s_ease-out]">
                    <div class="w-8 h-8 rounded-full bg-blue-900 ring-blue-500/50 flex items-center justify-center font-bold text-xs ring-2 shrink-0">U</div>
                    <div class="max-w-[80%] bg-blue-900/30 border-blue-500/30 rounded-tr-none p-4 rounded-2xl border text-sm text-gray-200 whitespace-pre-wrap leading-relaxed shadow-lg">
                        ${text || 'Shared a file'}
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', userHTML);
            container.scrollTop = container.scrollHeight;

            // 2. Append Assistant Placeholder
            const botId = `bot-msg-${Date.now()}`;
            const botHTML = `
                <div class="flex gap-4 animate-[slideIn_0.3s_ease-out]">
                    <div class="w-8 h-8 rounded-full bg-purple-900 ring-purple-500/50 flex items-center justify-center font-bold text-xs ring-2 shrink-0"><i data-lucide="bot" class="w-4 h-4"></i></div>
                    <div id="${botId}" class="max-w-[80%] bg-purple-900/30 border-purple-500/30 rounded-tl-none p-4 rounded-2xl border text-sm text-gray-200 whitespace-pre-wrap leading-relaxed shadow-lg flex items-center h-12">
                        <div class="dot-flashing mx-4"></div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', botHTML);
            container.scrollTop = container.scrollHeight;

            // 3. Stream Response
            try {
                const isUncensored = document.getElementById('uncensored-toggle') ? document.getElementById('uncensored-toggle').checked : false;

                const response = await fetch('http://localhost:3000/api/chats/message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chatId: currentChatId,
                        content: contentToSend,
                        model: document.getElementById('chat-model-select') ? document.getElementById('chat-model-select').value : 'dolphin-llama3:latest',
                        uncensored_override: isUncensored
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                const botDiv = document.getElementById(botId);
                let firstToken = true;
                let fullResponse = '';
                let buffer = ''; // Buffer for handling split JSON chunks across packets

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    buffer += chunk;
                    const lines = buffer.split('\n');

                    // Keep the last incomplete line in the buffer
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.trim() === '') continue; // Skip empty lines
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') {
                                const codeBlock = extractCodeFromResponse(fullResponse);
                                if (codeBlock) {
                                    openArtifact(codeBlock);
                                }
                                break;
                            }
                            try {
                                const json = JSON.parse(data);
                                if (json.token) {
                                    if (firstToken) {
                                        botDiv.innerHTML = ''; // Clear dots smoothly
                                        botDiv.classList.remove('flex', 'items-center', 'h-12'); // Remove centering

                                        // Set up a text node container to safely insert adjacent text
                                        const textSpan = document.createElement('span');
                                        botDiv.appendChild(textSpan);

                                        firstToken = false;
                                    }

                                    fullResponse += json.token;

                                    // Append text directly rather than thrashing innerHTML on the parent div
                                    // This is O(1) instead of O(N) where N is current response length
                                    if (botDiv.lastChild) {
                                        botDiv.lastChild.insertAdjacentText('beforeend', json.token);
                                    }

                                    // Debounce scrolling so we don't force layout recalculations on every single token
                                    if (!window.chatScrollTimeout) {
                                        window.chatScrollTimeout = setTimeout(() => {
                                            if (container) container.scrollTop = container.scrollHeight;
                                            window.chatScrollTimeout = null;
                                        }, 50);
                                    }
                                } else if (json.error) {
                                    botDiv.innerText = "Error: " + json.error;
                                    botDiv.classList.add('text-red-400');
                                }
                            } catch (e) {
                                // Silent catch: This is normal if a chunk is malformed, we just wait for the next packet
                            }
                        }
                    }
                }
            } catch (e) {
                console.error(e);
                document.getElementById(botId).innerText = "Connection Error: " + e.message;
            }
        }

            }

            const btn = document.getElementById('mic-btn');

                return;

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;

            recognition.onstart = () => {
                isRecording = true;
                btn.classList.add('text-red-500', 'animate-pulse');
                btn.classList.remove('text-gray-400');
                input.placeholder = "Listening...";
            };

            recognition.onresult = (event) => {
                let text = '';
                for (let i = 0; i < event.results.length; i++) {
                    text += event.results[i][0].transcript;
                }
                input.value = text;
            };

            recognition.onerror = (event) => {
                console.error("Speech error", event);
                recognition.stop();
            };

            recognition.onend = () => {
                isRecording = false;
                btn.classList.remove('text-red-500', 'animate-pulse');
                btn.classList.add('text-gray-400');
                input.placeholder = "Type a message, /fetch URL, or code request...";

                        mockCode = `// Simulation: Generated Code for "${prompt}"\n\nfunction executeTask() {\n    console.log("Veda Agent initializing...");\n    const timestamp = new Date().toISOString();\n    \n    // TODO: Implement core logic\n    return {\n        status: "success",\n        time: timestamp,\n        data: "Mock Data Result"\n    };\n}\n\n// Run\nexecuteTask();`;
